post:
  summary: "Upload a file"
  description: "Uploads a file to the server"
  consumes:
    - multipart/form-data
  parameters:
    - $ref: "common.yaml#/parameters/tenant"
    - name: file
      in: formData
      description: "The file to upload"
      required: true
      type: file
  responses:
    '200':
      description: ""
      schema:
        $ref: "#/definitions/UploadFileResponseDTO"
    default:
      description: "unexpected error"
      schema:
        $ref: "common.yaml#/definitions/ErrorDTO"
definitions:
  UploadFileResponseDTO:
    type: object
    properties:
      file_url:
        type: string