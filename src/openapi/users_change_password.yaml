put:
  security:
    - Bearer: [ ]
  description: "Change password a user"
  parameters:
    - $ref: "common.yaml#/parameters/tenant"
    - $ref: "common.yaml#/parameters/id"
    - name: user
      in: body
      schema:
        $ref: "#/definitions/ChangePasswordUserRequestDTO"
  responses:
    '200':
      description: ""
      schema:
        $ref: "#/definitions/ChangePasswordUserResponseDTO"
    default:
      description: "unexpected error"
      schema:
        $ref: "common.yaml#/definitions/ErrorDTO"
  tags:
    - User
definitions:
  ChangePasswordUserRequestDTO:
    type: object
    properties:
      new_password:
        type: string
        example: "T@$t1234"
  ChangePasswordUserResponseDTO:
    type: object
    properties:
      id:
        type: integer
